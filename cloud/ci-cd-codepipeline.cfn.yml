---
AWSTemplateFormatVersion: 2010-09-09

Description: EKSWSV1

Parameters:
  EksClusterName:
    Type: String
    Description: TODO - The name of the EKS cluster created
    Default: simple-jwt-api
    MinLength: 1
    MaxLength: 100
    ConstraintDescription: You must enter the EKS cluster name

  GitSourceRepo:
    Type: String
    Description: TODO - GitHub source repository - must contain a Dockerfile and buildspec.yml in the base
    Default: cd0157-Server-Deployment-and-Containerization
    MinLength: 1
    MaxLength: 100
    ConstraintDescription: You must enter a GitHub repository name

  GitBranch:
    Type: String
    Default: main
    Description: TODO - GitHub git repository branch - change triggers a new build
    MinLength: 1
    MaxLength: 100
    ConstraintDescription: You must enter a GitHub repository branch name

  GitHubToken:
    Type: String
    NoEcho: true
    Description: TODO - GitHub API token - see https://github.com/blog/1509-personal-api-tokens
    MinLength: 3
    MaxLength: 100
    ConstraintDescription: You must enter a GitHub personal access token

  GitHubUser:
    Type: String
    Default: Shayman-M-86
    Description: TODO - GitHub username or organization
    MinLength: 3
    MaxLength: 100
    ConstraintDescription: You must enter a GitHub username or organization

  CodeBuildDockerImage:
    Type: String
    Default: aws/codebuild/amazonlinux-x86_64-standard:5.0
    Description: AWS CodeBuild Docker optimized image
    MinLength: 3
    MaxLength: 100
    ConstraintDescription: You must enter a CodeBuild Docker image

  KubectlRoleName:
    Type: String
    Default: UdacityFlaskDeployCBKubectlRole
    Description: TODO - IAM role used by kubectl to interact with EKS cluster
    MinLength: 3
    MaxLength: 100
    ConstraintDescription: You must enter a kubectl IAM role

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: GitHub
        Parameters:
          - GitHubUser
          - GitHubToken
          - GitSourceRepo
          - GitBranch
      - Label:
          default: CodeBuild
        Parameters:
          - CodeBuildDockerImage
      - Label:
          default: IAM
        Parameters:
          - KubectlRoleName
      - Label:
          default: EKS
        Parameters:
          - EksClusterName
    ParameterLabels:
      GitHubUser:
        default: Username
      GitHubToken:
        default: Access token
      GitSourceRepo:
        default: Repository
      GitBranch:
        default: Branch
      CodeBuildDockerImage:
        default: Docker image
      KubectlRoleName:
        default: kubectl IAM role
      EksClusterName:
        default: EKS cluster name

Resources:
  EcrDockerRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  CodePipelineArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  CustomResourceLambda:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import json
          import logging
          import boto3
          import urllib3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          iam = boto3.client("iam")
          http = urllib3.PoolManager()

          def send_cfn_response(event, context, status, data=None, reason=None, physical_resource_id=None):
              response_body = {
                  "Status": status,
                  "Reason": reason or f"See details in CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": physical_resource_id or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }

              encoded_body = json.dumps(response_body).encode("utf-8")
              headers = {
                  "content-type": "",
                  "content-length": str(len(encoded_body)),
              }

              logger.info("Sending CloudFormation response: %s", response_body)

              http.request(
                  "PUT",
                  event["ResponseURL"],
                  body=encoded_body,
                  headers=headers,
              )

          def update_kubectl_role_trust(kubectl_role_name, codebuild_service_role_arn):
              assume = iam.get_role(RoleName=kubectl_role_name)
              assume_doc = assume["Role"]["AssumeRolePolicyDocument"]

              existing_statements = assume_doc.get("Statement", [])
              new_statements = []

              codebuild_statement = {
                  "Effect": "Allow",
                  "Principal": {"AWS": codebuild_service_role_arn},
                  "Action": "sts:AssumeRole",
              }
              new_statements.append(codebuild_statement)

              for statement in existing_statements:
                  principal = statement.get("Principal", {})
                  aws_principal = principal.get("AWS")

                  if isinstance(aws_principal, str):
                      if (
                          aws_principal.startswith("arn:aws:iam:")
                          and aws_principal != codebuild_service_role_arn
                      ):
                          new_statements.append(statement)

                  elif isinstance(aws_principal, list):
                      filtered = [
                          arn
                          for arn in aws_principal
                          if arn.startswith("arn:aws:iam:") and arn != codebuild_service_role_arn
                      ]
                      if filtered:
                          copied = dict(statement)
                          copied["Principal"] = dict(principal)
                          copied["Principal"]["AWS"] = filtered
                          new_statements.append(copied)

              assume_doc["Statement"] = new_statements

              logger.info("Updating trust policy for role %s", kubectl_role_name)
              iam.update_assume_role_policy(
                  RoleName=kubectl_role_name,
                  PolicyDocument=json.dumps(assume_doc),
              )

              return {
                  "Message": "Kubectl role trust policy updated successfully.",
                  "KubectlRoleName": kubectl_role_name,
                  "CodeBuildServiceRoleArn": codebuild_service_role_arn,
              }

          def handler(event, context):
              logger.info("Received event: %s", json.dumps(event))

              request_type = event.get("RequestType", "")
              physical_resource_id = event.get("PhysicalResourceId") or context.log_stream_name

              try:
                  resource_properties = event.get("ResourceProperties", {})
                  kubectl_role_name = resource_properties.get("KubectlRoleName")
                  codebuild_service_role_arn = resource_properties.get("CodeBuildServiceRoleArn")

                  if request_type in ("Create", "Update"):
                      if not kubectl_role_name or not codebuild_service_role_arn:
                          raise ValueError("Both KubectlRoleName and CodeBuildServiceRoleArn are required.")

                      data = update_kubectl_role_trust(
                          kubectl_role_name=kubectl_role_name,
                          codebuild_service_role_arn=codebuild_service_role_arn,
                      )

                      if request_type == "Update":
                          data["Message"] = "Kubectl role trust policy updated successfully on stack update."

                      send_cfn_response(
                          event=event,
                          context=context,
                          status="SUCCESS",
                          data=data,
                          physical_resource_id=physical_resource_id,
                      )

                  elif request_type == "Delete":
                      send_cfn_response(
                          event=event,
                          context=context,
                          status="SUCCESS",
                          data={"Message": "Delete request received. No action taken."},
                          physical_resource_id=physical_resource_id,
                      )

                  else:
                      raise ValueError(f"Unsupported RequestType: {request_type}")

                  return {
                      "statusCode": 200,
                      "body": json.dumps({"message": "Custom resource processed successfully."}),
                  }

              except Exception as exc:
                  logger.exception("Failed to process custom resource event")

                  send_cfn_response(
                      event=event,
                      context=context,
                      status="FAILED",
                      data={"Message": "Resource operation failed."},
                      reason=str(exc),
                      physical_resource_id=physical_resource_id,
                  )

                  return {
                      "statusCode": 500,
                      "body": json.dumps({"message": str(exc)}),
                  }

      Handler: index.handler
      Role: !GetAtt CustomResourceLambdaExecutionRole.Arn
      Runtime: python3.14
      Timeout: 120

  CustomResourceLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaENIManagementAccess
      Path: /
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              Service:
                - lambda.amazonaws.com
      Policies:
        - PolicyName: codepipeline-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${KubectlRoleName}
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:UpdateAssumeRolePolicy

  KubectlAssumeRoleCustomResource:
    Type: Custom::CustomResource
    Properties:
      ServiceToken: !GetAtt CustomResourceLambda.Arn
      KubectlRoleName: !Ref KubectlRoleName
      CodeBuildServiceRoleArn: !GetAtt CodeBuildServiceRole.Arn

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codepipeline-access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: "*"
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:UploadArchive
                  - codecommit:GetUploadArchiveStatus
                  - codecommit:CancelUploadArchive
                  - iam:PassRole
              - Resource: !Sub arn:aws:s3:::${CodePipelineArtifactBucket}/*
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${KubectlRoleName}
                Effect: Allow
                Action:
                  - sts:AssumeRole
              - Resource: "*"
                Effect: Allow
                Action:
                  - eks:Describe*
              - Resource: "*"
                Effect: Allow
                Action:
                  - ssm:GetParameters
              - Resource: "*"
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
              - Resource: "*"
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
              - Resource: "*"
                Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeDhcpOptions
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                  - ec2:CreateNetworkInterfacePermission
              - Resource: !Sub arn:aws:s3:::${CodePipelineArtifactBucket}/*
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
              - Resource: !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${EcrDockerRepository}
                Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Artifacts:
        Type: CODEPIPELINE
      Source:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Type: LINUX_CONTAINER
        Image: !Ref CodeBuildDockerImage
        EnvironmentVariables:
          - Name: REPOSITORY_URI
            Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrDockerRepository}
          - Name: REPOSITORY_NAME
            Value: !Ref GitSourceRepo
          - Name: REPOSITORY_BRANCH
            Value: !Ref GitBranch
          - Name: EKS_CLUSTER_NAME
            Value: !Ref EksClusterName
          - Name: EKS_KUBECTL_ROLE_ARN
            Value: !Sub arn:aws:iam::${AWS::AccountId}:role/${KubectlRoleName}
        PrivilegedMode: true
      Name: !Ref AWS::StackName
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
    DependsOn: KubectlAssumeRoleCustomResource

  CodePipelineGitHub:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref CodePipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: App
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Version: 1
                Provider: GitHub
              Configuration:
                Owner: !Ref GitHubUser
                Repo: !Ref GitSourceRepo
                Branch: !Ref GitBranch
                OAuthToken: !Ref GitHubToken
              OutputArtifacts:
                - Name: App
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Version: 1
                Provider: CodeBuild
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: App
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1
